name: CI

on:
  push:
    branches:
      - main
      - dev
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type-check
        run: npm run typecheck

      - name: Validate diff
        run: npm run lint

      - name: Run full test and report chain
        run: npm test

      - name: Run worker tests
        run: npm run test:worker

      - name: Audit production dependencies
        run: npm audit --omit=dev --audit-level=high

  coverage:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    # Non-blocking baseline gate: publishes a coverage report and artifact but
    # never fails the pipeline. Thresholds live in .c8rc.json (check-coverage is
    # off this iteration); raise them in a follow-up once the baseline holds.
    continue-on-error: true

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Collect in-process unit-test coverage
        run: npm run coverage

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: coverage-${{ github.sha }}
          path: |
            coverage/lcov.info
            coverage/coverage-summary.json
          if-no-files-found: ignore
          retention-days: 30

  browser:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Chromium
        run: npx playwright install --with-deps chromium

      - name: Run Dashboard browser tests
        run: npm run test:web:e2e

      - name: Upload browser failure evidence
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: browser-e2e-evidence-${{ github.sha }}
          path: apps/web/test-results/
          if-no-files-found: ignore
          retention-days: 30

  full-stack:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Prepare ephemeral production configuration
        run: node scripts/prepare-ci-production.mjs

      - name: Run production preflight
        env:
          AGENTOPS_ENV_FILE: .env.ci.preflight
        run: npm run deploy:preflight

      - name: Prepare Compose secret ownership
        run: ENV_FILE=.env.ci.smoke sh scripts/ops/prepare-compose-secrets.sh

      - name: Start deterministic OIDC/provider/Chatwoot mock
        run: |
          mkdir -p tmp/ci-evidence
          docker compose --env-file .env.ci.smoke \
            -f infra/docker/compose.production.yml \
            -f infra/docker/compose.ci-smoke.yml \
            up -d --wait --wait-timeout 120 smoke-mock

      - name: Validate production Compose
        run: >-
          docker compose --env-file .env.ci.smoke
          -f infra/docker/compose.production.yml
          -f infra/docker/compose.ci-smoke.yml
          config

      - name: Boot production core stack
        run: bash scripts/ci-compose-core-boot.sh

      - name: Run authenticated production smoke
        run: |
          set -a
          . ./.env.ci.smoke
          set +a
          export SMOKE_DATABASE_URL="postgresql://${AGENTOPS_POSTGRES_USER}:${AGENTOPS_POSTGRES_PASSWORD}@127.0.0.1:${AGENTOPS_POSTGRES_PORT}/${AGENTOPS_POSTGRES_DB}"
          export SMOKE_MASTER_KEY_FILE=secrets/agentops_master_key
          npm run smoke:production | tee tmp/ci-evidence/production-smoke.json

      - name: Run production HTTP load gate
        run: |
          set -a
          . ./.env.ci.smoke
          set +a
          export SMOKE_DATABASE_URL="postgresql://${AGENTOPS_POSTGRES_USER}:${AGENTOPS_POSTGRES_PASSWORD}@127.0.0.1:${AGENTOPS_POSTGRES_PORT}/${AGENTOPS_POSTGRES_DB}"
          export SMOKE_MASTER_KEY_FILE=secrets/agentops_master_key
          npm run perf:production -- \
            --json tmp/ci-evidence/production-load.json \
            --markdown tmp/ci-evidence/production-load.md \
            --warmup 2 \
            --iterations 20 \
            --concurrency 4 \
            --max-p95-ms 5000 \
            --max-error-rate 0 \
            --min-throughput 0.5 \
            | tee tmp/ci-evidence/production-load-summary.json

      - name: Boot production observability stack
        run: |
          compose() {
            docker compose --env-file .env.ci.smoke \
              -f infra/docker/compose.production.yml \
              -f infra/docker/compose.ci-smoke.yml \
              "$@"
          }
          compose up -d --no-deps --wait --wait-timeout 240 prometheus grafana || {
            compose ps --all
            compose logs --no-color --tail=200 api worker prometheus grafana
            exit 1
          }

      - name: Verify Prometheus and Grafana provisioning
        run: |
          set -a
          . ./.env.ci.smoke
          set +a
          export GRAFANA_ADMIN_PASSWORD_FILE=secrets/grafana_admin_password
          npm run verify:observability | tee tmp/ci-evidence/observability.json

      - name: Capture secret-safe runtime evidence
        if: always()
        run: |
          mkdir -p tmp/ci-evidence
          compose() {
            docker compose --env-file .env.ci.smoke \
              -f infra/docker/compose.production.yml \
              -f infra/docker/compose.ci-smoke.yml \
              "$@"
          }
          compose ps --all --format json > tmp/ci-evidence/compose-ps.json || true
          compose logs --no-color --tail=400 postgres redis migrate api worker web prometheus grafana smoke-mock > tmp/ci-evidence/compose-services.log || true
          for service in postgres redis migrate api worker web prometheus grafana smoke-mock; do
            container_id="$(compose ps --all -q "$service" || true)"
            if [ -n "$container_id" ]; then
              docker inspect --format '{{json .State}}' "$container_id" > "tmp/ci-evidence/state-${service}.json" || true
            fi
          done
          curl -fsS http://127.0.0.1:8088/health/ready > tmp/ci-evidence/api-readiness.json || true
          curl -fsS http://127.0.0.1:8088/worker/health/ready > tmp/ci-evidence/worker-readiness.json || true

      - name: Upload full-stack evidence
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: full-stack-evidence-${{ github.sha }}
          path: |
            tmp/ci-evidence/*.json
            tmp/ci-evidence/*.md
            tmp/ci-evidence/*.log
            tmp/deploy-readiness.json
            tmp/deploy-readiness.md
          if-no-files-found: error
          retention-days: 30

      - name: Stop production stack
        if: always()
        run: |
          docker compose --env-file .env.ci.smoke \
            -f infra/docker/compose.production.yml \
            -f infra/docker/compose.ci-smoke.yml \
            down -v --remove-orphans || true

  supply-chain:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: api
            dockerfile: infra/docker/Dockerfile.api
          - name: worker
            dockerfile: infra/docker/Dockerfile.worker
          - name: web
            dockerfile: infra/docker/Dockerfile.web

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Validate time-bounded vulnerability allowlist
        run: npm run security:allowlist

      - name: Create security evidence directory
        run: mkdir -p tmp/security

      - name: Build immutable application image
        run: >-
          docker build
          -f ${{ matrix.dockerfile }}
          -t opensupport-agentops-${{ matrix.name }}:${{ github.sha }}
          .

      - name: Generate vulnerability report
        uses: aquasecurity/trivy-action@a9c7b0f06e461e9d4b4d1711f154ee024b8d7ab8 # v0.36.0
        with:
          image-ref: opensupport-agentops-${{ matrix.name }}:${{ github.sha }}
          format: json
          output: tmp/security/trivy-${{ matrix.name }}.json
          severity: HIGH,CRITICAL
          ignore-unfixed: false
          exit-code: 0
          trivyignores: tmp/.trivyignore

      - name: Report critical vulnerabilities
        uses: aquasecurity/trivy-action@a9c7b0f06e461e9d4b4d1711f154ee024b8d7ab8 # v0.36.0
        with:
          image-ref: opensupport-agentops-${{ matrix.name }}:${{ github.sha }}
          format: table
          severity: CRITICAL
          ignore-unfixed: false
          exit-code: 1
          trivyignores: tmp/.trivyignore
          skip-setup-trivy: true

      - name: Generate SPDX JSON SBOM
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0
        with:
          image: opensupport-agentops-${{ matrix.name }}:${{ github.sha }}
          format: spdx-json
          output-file: tmp/security/sbom-${{ matrix.name }}.spdx.json
          artifact-name: sbom-${{ matrix.name }}-${{ github.sha }}.spdx.json
          upload-artifact: false
          upload-release-assets: false

      - name: Upload supply-chain evidence
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: supply-chain-${{ matrix.name }}-${{ github.sha }}
          path: tmp/security/
          if-no-files-found: error
          retention-days: 30
