name: CI

on:
  push:
    branches:
      - main
      - dev
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type-check
        run: npm run typecheck

      - name: Validate diff
        run: npm run lint

      - name: Run full test and report chain
        run: npm test

      - name: Run worker tests
        run: npm run test:worker

      - name: Audit production dependencies
        run: npm audit --omit=dev --audit-level=high

  browser:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Chromium
        run: npx playwright install --with-deps chromium

      - name: Run Dashboard browser tests
        run: npm run test:web:e2e

  containers:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Prepare validation secrets
        run: |
          mkdir -p secrets
          printf 'base64url:AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA\n' > secrets/agentops_master_key
          printf 'grafana-validation-password\n' > secrets/grafana_admin_password

      - name: Validate production Compose
        run: >-
          docker compose --env-file .env.production.example
          -f infra/docker/compose.production.yml config

      - name: Build API image
        run: docker build -f infra/docker/Dockerfile.api -t agentops-api:test .

      - name: Build worker image
        run: docker build -f infra/docker/Dockerfile.worker -t agentops-worker:test .

      - name: Build web image
        run: docker build -f infra/docker/Dockerfile.web -t agentops-web:test .
