global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/alerts.yml

scrape_configs:
  - job_name: agentops-api
    metrics_path: /metrics
    static_configs:
      - targets: ["api:8080"]

  - job_name: agentops-worker
    metrics_path: /metrics
    static_configs:
      - targets: ["worker:8081"]
