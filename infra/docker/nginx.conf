map $request_method $operator_read_key {
  GET $binary_remote_addr;
  HEAD $binary_remote_addr;
  default "";
}

map $request_method $operator_write_key {
  GET "";
  HEAD "";
  OPTIONS "";
  default $binary_remote_addr;
}

map $uri $agentops_cache_control {
  ~*\.(?:css|js|map|png|jpg|jpeg|gif|webp|ico|woff2?)$ "public, max-age=31536000, immutable";
  default "no-store";
}

limit_req_zone $binary_remote_addr zone=agentops_auth:10m rate=5r/s;
limit_req_zone $binary_remote_addr zone=agentops_chatwoot:10m rate=30r/s;
limit_req_zone $operator_read_key zone=agentops_operator_read:10m rate=20r/s;
limit_req_zone $operator_write_key zone=agentops_operator_write:10m rate=5r/s;
limit_conn_zone $binary_remote_addr zone=agentops_connections:10m;

server {
  listen 8080;
  server_name _;
  server_tokens off;

  root /usr/share/nginx/html;
  index index.html;

  client_max_body_size 1m;
  client_body_timeout 15s;
  client_header_timeout 10s;
  client_header_buffer_size 1k;
  large_client_header_buffers 4 8k;
  keepalive_timeout 20s;
  keepalive_requests 1000;
  send_timeout 35s;
  limit_conn agentops_connections 30;
  limit_req_status 429;

  error_page 413 = @payload_too_large;
  error_page 429 = @rate_limited;
  error_page 504 = @upstream_timeout;

  location /api/v1/auth/ {
    limit_req zone=agentops_auth burst=10 nodelay;
    include /etc/nginx/conf.d/_agentops-proxy.inc;
    proxy_send_timeout 35s;
    proxy_read_timeout 35s;
    proxy_pass http://api:8080;
  }

  location ~ ^/api/v1/chatwoot/(?:agent-bot|webhooks)/ {
    limit_req zone=agentops_chatwoot burst=60 nodelay;
    include /etc/nginx/conf.d/_agentops-proxy.inc;
    proxy_send_timeout 35s;
    proxy_read_timeout 35s;
    proxy_pass http://api:8080;
  }

  location = /api/v1/tenants {
    limit_req zone=agentops_operator_read burst=40 nodelay;
    limit_req zone=agentops_operator_write burst=10 nodelay;
    include /etc/nginx/conf.d/_agentops-proxy.inc;
    proxy_send_timeout 35s;
    proxy_read_timeout 35s;
    proxy_pass http://api:8080;
  }

  location /api/v1/tenants/ {
    limit_req zone=agentops_operator_read burst=40 nodelay;
    limit_req zone=agentops_operator_write burst=10 nodelay;
    include /etc/nginx/conf.d/_agentops-proxy.inc;
    proxy_send_timeout 35s;
    proxy_read_timeout 35s;
    proxy_pass http://api:8080;
  }

  location /api/ {
    limit_req zone=agentops_operator_read burst=20 nodelay;
    limit_req zone=agentops_operator_write burst=5 nodelay;
    include /etc/nginx/conf.d/_agentops-proxy.inc;
    proxy_send_timeout 35s;
    proxy_read_timeout 35s;
    proxy_pass http://api:8080;
  }

  location /health/ {
    include /etc/nginx/conf.d/_agentops-proxy.inc;
    proxy_read_timeout 5s;
    proxy_send_timeout 5s;
    proxy_pass http://api:8080;
  }

  location /worker/health/ {
    rewrite ^/worker(/health/.*)$ $1 break;
    include /etc/nginx/conf.d/_agentops-proxy.inc;
    proxy_read_timeout 5s;
    proxy_send_timeout 5s;
    proxy_pass http://worker:8081;
  }

  location = /nginx-health {
    access_log off;
    default_type text/plain;
    return 200 "ok\n";
  }

  location / {
    try_files $uri $uri/ /index.html;
  }

  location @payload_too_large {
    default_type application/json;
    return 413 '{"error":{"code":"payload_too_large","message":"Request payload is too large","request_id":"$request_id"}}';
  }

  location @rate_limited {
    default_type application/json;
    return 429 '{"error":{"code":"rate_limited","message":"Request rate limit exceeded","request_id":"$request_id"}}';
  }

  location @upstream_timeout {
    default_type application/json;
    return 504 '{"error":{"code":"upstream_timeout","message":"Upstream request timed out","request_id":"$request_id"}}';
  }

  add_header Cache-Control $agentops_cache_control always;
  add_header Content-Security-Policy "default-src 'self'; base-uri 'self'; connect-src 'self'; font-src 'self'; form-action 'self'; frame-ancestors 'none'; img-src 'self' data:; object-src 'none'; script-src 'self'; style-src 'self'" always;
  add_header Permissions-Policy "camera=(), geolocation=(), microphone=(), payment=(), usb=()" always;
  add_header Referrer-Policy no-referrer always;
  add_header Strict-Transport-Security "${AGENTOPS_HSTS_VALUE}" always;
  add_header X-Content-Type-Options nosniff always;
  add_header X-Frame-Options DENY always;
}
